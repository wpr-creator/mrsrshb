<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PORTAL PARK 2 — Mrs. Rogers’ Purple Door Land</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#251a37;--deep:#22123d;--purple:#6d3fb3;--plum:#3c1d66;--gold:#f5b642;--mint:#84dcc6;--sky:#8fd3ff;--paper:#fffaf1;--line:#251a37;--good:#16834a;--bad:#c52d2d;--body:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
html{font-size:22px} body{min-height:100vh;font-family:var(--body);color:var(--ink);background:radial-gradient(circle at 12% 10%,#d9c4ff 0 16%,transparent 17%),radial-gradient(circle at 88% 18%,#ffd98a 0 13%,transparent 14%),linear-gradient(180deg,#efe6ff 0%,#f8efe0 55%,#dff6f1 100%);overflow-x:hidden}button{font-family:inherit;cursor:pointer} .hidden{display:none!important}
.app{min-height:100vh;display:flex;flex-direction:column}.top{display:flex;gap:.6rem;align-items:center;justify-content:space-between;flex-wrap:wrap;padding:.7rem 1rem;border-bottom:4px solid var(--line);background:rgba(255,255,255,.8);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20}.brand{font-weight:1000;letter-spacing:.06em;color:var(--plum);font-size:clamp(1rem,2.2vw,1.35rem)}.stats{display:flex;gap:.4rem;flex-wrap:wrap}.pill{border:3px solid var(--line);border-radius:999px;background:#fff;padding:.35rem .65rem;font-weight:1000;box-shadow:0 4px 0 var(--line);font-size:clamp(.78rem,2vw,1rem)}
main{width:100%;max-width:1180px;margin:0 auto;padding:1rem;display:flex;flex-direction:column;gap:1rem}.hero{display:grid;grid-template-columns:1.15fr .85fr;gap:1rem;align-items:stretch}@media(max-width:850px){.hero{grid-template-columns:1fr}}.panel{border:4px solid var(--line);border-radius:30px;background:rgba(255,255,255,.9);box-shadow:0 9px 0 var(--line),0 18px 34px rgba(34,18,61,.18);overflow:hidden}.intro{padding:1.25rem;display:flex;flex-direction:column;justify-content:center;gap:.65rem}.eyebrow{font-weight:1000;letter-spacing:.14em;color:#7151a7;font-size:clamp(.75rem,1.8vw,.9rem)}h1{font-size:clamp(2.1rem,7vw,4.5rem);line-height:.9;letter-spacing:.02em;color:var(--plum);text-transform:uppercase}.lead{font-size:clamp(1.1rem,2.8vw,1.45rem);line-height:1.35;font-weight:850;color:#4a365f;max-width:850px}.doorScene{min-height:300px;position:relative;background:linear-gradient(180deg,#a98df5,#7650c6 55%,#4c2a85);display:grid;place-items:center}.door{width:min(260px,55vw);height:260px;border:8px solid #29143f;border-radius:24px 24px 10px 10px;background:linear-gradient(135deg,#8b5cf6,#4c1d95);box-shadow:inset -20px 0 0 rgba(0,0,0,.14),0 14px 0 #29143f,0 26px 38px rgba(0,0,0,.3);position:relative}.door:before{content:"";position:absolute;left:35px;right:35px;top:34px;height:78px;border:5px solid rgba(255,255,255,.35);border-radius:18px}.door:after{content:"";position:absolute;right:34px;top:138px;width:22px;height:22px;border-radius:50%;background:#ffd166;border:4px solid #29143f}.spark{position:absolute;border-radius:50%;background:#ffe89a;box-shadow:0 0 20px #fff;animation:float 4s ease-in-out infinite}.spark.a{width:18px;height:18px;left:18%;top:18%}.spark.b{width:12px;height:12px;right:18%;top:28%;animation-delay:1s}.spark.c{width:16px;height:16px;right:30%;bottom:18%;animation-delay:2s}@keyframes float{50%{transform:translateY(-18px) scale(1.15)}}
.worldGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:.8rem}@media(max-width:1000px){.worldGrid{grid-template-columns:repeat(2,1fr)}}@media(max-width:560px){.worldGrid{grid-template-columns:1fr}}.worldCard{text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:.55rem;padding:.75rem;border:4px solid var(--line);border-radius:28px;background:rgba(255,255,255,.92);box-shadow:0 8px 0 var(--line);transition:.12s}.worldCard:hover{transform:translateY(-5px);box-shadow:0 13px 0 var(--line),0 20px 30px rgba(34,18,61,.15)}.worldArt{height:150px;border-radius:22px;border:3px solid var(--line);overflow:hidden;position:relative;background:linear-gradient(180deg,#d7f3ff,#fff)}.worldArt img{position:absolute;max-width:40%;max-height:48%;object-fit:contain;filter:drop-shadow(0 8px 2px rgba(0,0,0,.14))}.worldArt .portalRing{position:absolute;inset:18px auto auto 50%;width:92px;height:118px;margin-left:-46px;border-radius:50% 50% 42% 42%;border:10px solid #fff;background:radial-gradient(circle,#fff,#b78cff 45%,#4c1d95 72%);box-shadow:0 0 28px #fff}.worldName{text-align:center;font-size:clamp(1.15rem,3vw,1.65rem);font-weight:1000;line-height:1;text-transform:uppercase}.worldLine{text-align:center;font-weight:900;font-size:clamp(.9rem,2.3vw,1.1rem);line-height:1.25;color:#584a66}.btn{border:4px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#ffe18a,#f5b642);padding:.65rem .9rem;font-size:clamp(1rem,2.5vw,1.25rem);font-weight:1000;box-shadow:0 6px 0 var(--line);text-transform:uppercase}.btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--line)}.btn.alt{background:#fff}.btn.good{background:linear-gradient(180deg,#b9f2d5,#70d99f)}.btn.bad{background:linear-gradient(180deg,#ffd2d2,#ff9090)}
#gameScreen{display:none}.gameLayout{display:grid;grid-template-columns:minmax(260px,390px) 1fr;gap:1rem;align-items:start}@media(max-width:900px){.gameLayout{grid-template-columns:1fr}}.mapPanel{padding:.8rem}.mapTitle{font-size:clamp(1.4rem,4vw,2.1rem);font-weight:1000;text-transform:uppercase;line-height:1;text-align:center;color:var(--plum)}.mapSub{text-align:center;font-weight:900;color:#5d5270;margin:.25rem 0 .65rem}.mapBoard{position:relative;height:500px;border:4px solid var(--line);border-radius:28px;background:linear-gradient(180deg,#e7f7ff,#fff4d8);overflow:hidden}.pathLine{position:absolute;left:16%;right:16%;top:18%;bottom:16%;background:linear-gradient(180deg,transparent 0 8%,rgba(60,29,102,.35) 8% 10%,transparent 10% 24%,rgba(60,29,102,.35) 24% 26%,transparent 26% 40%,rgba(60,29,102,.35) 40% 42%,transparent 42% 56%,rgba(60,29,102,.35) 56% 58%,transparent 58% 72%,rgba(60,29,102,.35) 72% 74%,transparent 74%);transform:skewX(-10deg);opacity:.7}.node{position:absolute;width:72px;height:72px;border-radius:24px;border:4px solid var(--line);background:#fff;display:grid;place-items:center;font-weight:1000;box-shadow:0 6px 0 var(--line);transition:.2s}.node.done{background:#d8ffe8}.node.active{background:#ffe18a;transform:scale(1.08);box-shadow:0 8px 0 var(--line),0 0 0 10px rgba(255,225,138,.42)}.node.locked{opacity:.48}.node img{max-width:55px;max-height:55px}.player{position:absolute;width:54px;height:54px;border:4px solid var(--line);border-radius:50%;background:#8b5cf6;box-shadow:0 6px 0 var(--line);transition:.45s;z-index:6}.player:after{content:"";position:absolute;inset:10px;border-radius:50%;background:#fff;opacity:.28}.actionPanel{padding:1rem;min-height:500px;display:flex;flex-direction:column;gap:.8rem}.eventTitle{font-size:clamp(1.55rem,4.4vw,2.7rem);font-weight:1000;text-transform:uppercase;color:var(--plum);line-height:1}.eventText{font-size:clamp(1.1rem,2.8vw,1.45rem);line-height:1.35;font-weight:850;color:#463752}.visual{min-height:160px;border:3px solid var(--line);border-radius:24px;background:#fff;display:grid;place-items:center;padding:.7rem;overflow:hidden}.visual svg{width:100%;height:auto;max-width:720px}.choices{display:grid;grid-template-columns:repeat(2,1fr);gap:.55rem}@media(max-width:620px){.choices{grid-template-columns:1fr}}.choice{border:4px solid var(--line);border-radius:20px;background:#fff;padding:.75rem;font-size:clamp(1.05rem,3vw,1.45rem);font-weight:1000;box-shadow:0 6px 0 var(--line);line-height:1.2}.choice:hover:not(:disabled){background:#fff1ba;transform:translateY(-2px)}.choice.correct{background:#d8ffe8}.choice.wrong{background:#ffd6d6}.shopGrid,.collectionGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem}@media(max-width:700px){.shopGrid,.collectionGrid{grid-template-columns:1fr}}.shopItem,.collectionItem{border:3px solid var(--line);border-radius:20px;padding:.65rem;background:#fff;display:flex;flex-direction:column;gap:.25rem;align-items:center;text-align:center;font-weight:900}.shopItem img,.collectionItem img{height:54px;object-fit:contain}.tiny{font-size:clamp(.8rem,2vw,1rem);color:#665a75;font-weight:850}.footerBtns{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:auto}.notice{border:3px dashed #8b5cf6;background:#f2ebff;border-radius:22px;padding:.75rem;font-size:clamp(1rem,2.5vw,1.2rem);font-weight:900;color:#493067}.miniGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;width:100%}.miniGem{height:72px;border:4px solid var(--line);border-radius:18px;background:#fff;display:grid;place-items:center}.miniGem.target{background:#d8ffe8}.miniGem svg{width:50px;height:50px}.memoryGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem}.memoryCard{min-height:78px;border:4px solid var(--line);border-radius:18px;background:#fff;font-weight:1000;font-size:1.2rem;box-shadow:0 5px 0 var(--line)}.memoryCard.open{background:#ffe18a}.memoryCard.matched{background:#d8ffe8;box-shadow:none}.answerExplain{font-size:clamp(.95rem,2.4vw,1.15rem);font-weight:850;color:#5a4b67;line-height:1.3}
</style>
</head>
<body>
<div class="app">
<header class="top"><div class="brand">MRS. ROGERS’ PURPLE DOOR LAND</div><div class="stats"><div class="pill" id="gemStat">GEMS 0</div><div class="pill" id="keyStat">KEYS 0</div><div class="pill" id="itemStat">ITEMS 0</div></div></header>
<main>
<section id="homeScreen">
  <div class="hero">
    <div class="panel intro"><div class="eyebrow">PORTAL PARK 2</div><h1>CHOOSE A DOOR. CHANGE THE MAP.</h1><p class="lead">Collect gems, unlock gates, rescue helpers, and use what you know to open new paths.</p><button class="btn" onclick="openShop()">OPEN GEM SHOP</button></div>
    <div class="panel doorScene"><div class="spark a"></div><div class="spark b"></div><div class="spark c"></div><div class="door" aria-label="purple door"></div></div>
  </div>
  <div class="worldGrid" id="worldGrid"></div>
</section>
<section id="gameScreen"><div class="gameLayout"><aside class="panel mapPanel"><div class="mapTitle" id="mapTitle">WORLD</div><div class="mapSub" id="mapSub">Follow the glowing trail.</div><div class="mapBoard" id="mapBoard"><div class="pathLine"></div><div class="player" id="player"></div></div></aside><section class="panel actionPanel" id="actionPanel"></section></div></section>
</main>
</div>
<script>
'use strict';
const A={uiStar:'assets/kenney-ui/PNG/Green/Default/star.png',button:'assets/kenney-ui/PNG/Green/Default/button_rectangle_depth_gloss.png',rabbit:'assets/kenney-animals/PNG/Square-without-details/rabbit.png',giraffe:'assets/kenney-animals/PNG/Square-without-details/giraffe.png',monkey:'assets/kenney-animals/PNG/Square-without-details/monkey.png',parrot:'assets/kenney-animals/PNG/Square-without-details/parrot.png',ship:'assets/kenney-space/PNG/Sprites-X2/Ships/spaceShips_001.png',rocket:'assets/kenney-space/PNG/Sprites-X2/Rockets/spaceRockets_001.png',station:'assets/kenney-space/PNG/Sprites-X2/Station/spaceStation_001.png'};
const state={gems:0,keys:0,items:[],world:null,node:0,done:{},unlocked:{safari:true,space:true,candy:true,city:true},memoryOpen:[],memoryMatched:[]};
const worlds=[{id:'safari',name:'SAFARI TRAIL',line:'Read data, compare animals, and open the river gate.',color:'#d9f5c5',img:A.giraffe,accent:'#7bbf47'},{id:'space',name:'SPACE STATION',line:'Tell time, read charts, and power the rocket path.',color:'#dce8ff',img:A.rocket,accent:'#5b7cfa'},{id:'candy',name:'CANDY CROSSING',line:'Use money and skip-counting to unlock treasure carts.',color:'#ffe4f0',img:A.rabbit,accent:'#ef6aa5'},{id:'city',name:'CITY QUEST',line:'Read maps, choose safe routes, and solve community problems.',color:'#e1f7ff',img:A.parrot,accent:'#28a6c7'}];
const nodePos=[['12%','78%'],['31%','64%'],['18%','48%'],['52%','42%'],['38%','26%'],['67%','18%'],['78%','36%'],['64%','58%'],['84%','72%']];
const banks={
safari:[
 {type:'chart',title:'ANIMAL COUNT',text:'Which animal has exactly 6 visitors watching it?',data:{title:'Zoo Visitors',labels:['Giraffe','Monkey','Parrot','Rabbit'],values:[6,9,4,7]},answer:'Giraffe',choices:['Giraffe','Monkey','Parrot','Rabbit'],ex:'The giraffe bar reaches 6.'},
 {type:'pictograph',title:'LUNCH BASKETS',text:'Each picture stands for 2 baskets. Which group brought 8 baskets?',data:{key:'1 picture = 2 baskets',rows:[['Red Team',3],['Blue Team',4],['Green Team',2]]},answer:'Blue Team',choices:['Red Team','Blue Team','Green Team','All teams'],ex:'4 pictures × 2 = 8 baskets.'},
 {type:'compare',title:'TRACK CLUES',text:'A giraffe track is 18 inches. A monkey track is 6 inches. How much longer is the giraffe track?',answer:'12 inches',choices:['6 inches','10 inches','12 inches','24 inches'],ex:'18 − 6 = 12.'},
 {type:'choice',title:'HABITAT HELP',text:'A desert animal needs a home. Which habitat clue fits best?',answer:'hot and dry',choices:['hot and dry','icy and wet','deep ocean','dark cave'],ex:'Deserts are hot and dry.'},
 {type:'sort',title:'ANIMAL SORT',text:'Which animal group has feathers?',answer:'birds',choices:['birds','mammals','fish','insects'],ex:'Birds have feathers.'},
 {type:'pictograph',title:'WATER STATION',text:'Each picture stands for 5 cups. How many cups did the monkeys drink?',data:{key:'1 picture = 5 cups',rows:[['Giraffes',2],['Monkeys',3],['Parrots',1]]},answer:'15 cups',choices:['5 cups','10 cups','15 cups','20 cups'],ex:'3 pictures × 5 = 15.'}],
space:[
 {type:'clock',title:'LAUNCH TIME',text:'What time is shown on the station clock?',data:{h:3,m:30},answer:'3:30',choices:['3:00','3:30','6:15','2:30'],ex:'The minute hand is on 6, so it is :30.'},
 {type:'clock',title:'ROVER CHECK',text:'The rover leaves when the clock shows:',data:{h:7,m:15},answer:'7:15',choices:['7:15','7:45','3:35','6:15'],ex:'The minute hand is on 3, so it is :15.'},
 {type:'chart',title:'MOON ROCK DATA',text:'Which day had the most moon rocks?',data:{title:'Moon Rocks Found',labels:['Mon','Tue','Wed','Thu'],values:[5,8,3,6]},answer:'Tuesday',choices:['Monday','Tuesday','Wednesday','Thursday'],ex:'Tuesday has the tallest bar.'},
 {type:'compare',title:'STAR COUNT',text:'The blue telescope found 42 stars. The red telescope found 27. How many more did blue find?',answer:'15',choices:['12','15','19','69'],ex:'42 − 27 = 15.'},
 {type:'choice',title:'PLANET ORDER',text:'Which object is closest to Earth?',answer:'the Moon',choices:['the Moon','the Sun','Neptune','a far galaxy'],ex:'The Moon is Earth’s closest neighbor in this list.'},
 {type:'pictograph',title:'ROCKET FUEL',text:'Each picture stands for 10 fuel cells. How many fuel cells are in Bay 2?',data:{key:'1 picture = 10 fuel cells',rows:[['Bay 1',4],['Bay 2',6],['Bay 3',3]]},answer:'60',choices:['6','30','60','90'],ex:'6 pictures × 10 = 60.'}],
candy:[
 {type:'money',title:'CANDY CART',text:'How much money is shown?',data:['quarter','dime','nickel','penny'],answer:'41¢',choices:['31¢','36¢','41¢','46¢'],ex:'25 + 10 + 5 + 1 = 41.'},
 {type:'money',title:'TOKEN BOX',text:'How much money is shown?',data:['quarter','quarter','dime'],answer:'60¢',choices:['35¢','50¢','60¢','70¢'],ex:'25 + 25 + 10 = 60.'},
 {type:'compare',title:'TICKET PRICE',text:'A prize costs 75¢. You have 50¢. How much more do you need?',answer:'25¢',choices:['15¢','20¢','25¢','35¢'],ex:'75 − 50 = 25.'},
 {type:'choice',title:'FAIR TRADE',text:'Which group has the same value as one quarter?',answer:'2 dimes and 1 nickel',choices:['2 dimes and 1 nickel','3 nickels','1 dime and 1 penny','4 pennies'],ex:'20¢ + 5¢ = 25¢.'},
 {type:'pictograph',title:'CANDY VOTES',text:'Each picture stands for 2 votes. Which candy got 10 votes?',data:{key:'1 picture = 2 votes',rows:[['Berry',5],['Lemon',3],['Mint',4]]},answer:'Berry',choices:['Berry','Lemon','Mint','None'],ex:'5 pictures × 2 = 10.'},
 {type:'chart',title:'SHOP SALES',text:'Which item sold fewer than 5?',data:{title:'Treats Sold',labels:['Pop','Gum','Cake','Juice'],values:[7,4,9,6]},answer:'Gum',choices:['Pop','Gum','Cake','Juice'],ex:'Gum has a value of 4.'}],
city:[
 {type:'map',title:'PARK MAP',text:'Start at school. Go east 2 blocks, then north 1 block. Where are you?',answer:'Library',choices:['Library','Park','Store','Pool'],ex:'Follow the path to the library.'},
 {type:'choice',title:'COMMUNITY CHOICE',text:'A class wants a safer street crossing. Who should they ask first?',answer:'the city council',choices:['the city council','a grocery clerk','a dentist','a movie actor'],ex:'City councils help make local rules and safety choices.'},
 {type:'chart',title:'CLASS PET VOTE',text:'Which pet got the fewest votes?',data:{title:'Pet Votes',labels:['Fish','Rabbit','Lizard','Bird'],values:[8,6,4,7]},answer:'Lizard',choices:['Fish','Rabbit','Lizard','Bird'],ex:'The lizard bar is lowest.'},
 {type:'compare',title:'BUS ROUTES',text:'Bus A has 36 riders. Bus B has 48 riders. How many more riders are on Bus B?',answer:'12',choices:['8','10','12','14'],ex:'48 − 36 = 12.'},
 {type:'choice',title:'MAP KEY',text:'On a map, a small book symbol most likely means:',answer:'library',choices:['library','airport','hospital','beach'],ex:'A book symbol usually marks a library.'},
 {type:'pictograph',title:'RECYCLING DAY',text:'Each picture stands for 5 cans. Which class collected 25 cans?',data:{key:'1 picture = 5 cans',rows:[['Room 1',3],['Room 2',5],['Room 3',4]]},answer:'Room 2',choices:['Room 1','Room 2','Room 3','All rooms'],ex:'5 pictures × 5 = 25.'}]
};
function $(id){return document.getElementById(id)}
function updateStats(){ $('gemStat').textContent='GEMS '+state.gems; $('keyStat').textContent='KEYS '+state.keys; $('itemStat').textContent='ITEMS '+state.items.length; }
function renderHome(){updateStats();$('homeScreen').style.display='block';$('gameScreen').style.display='none';$('worldGrid').innerHTML=worlds.map(w=>`<button class="worldCard" onclick="startWorld('${w.id}')"><div class="worldArt" style="background:linear-gradient(180deg,${w.color},#fff)"><div class="portalRing"></div><img src="${w.img}" alt="" style="left:8%;bottom:10%"><img src="${w.id==='space'?A.ship:A.uiStar}" alt="" style="right:8%;top:12%"></div><div class="worldName">${w.name}</div><div class="worldLine">${w.line}</div></button>`).join('')}
function startWorld(id){state.world=id;state.node=0;state.memoryOpen=[];state.memoryMatched=[];$('homeScreen').style.display='none';$('gameScreen').style.display='block';const w=worlds.find(x=>x.id===id);$('mapTitle').textContent=w.name;$('mapSub').textContent='Use gems, keys, and helper items to open the best path.';buildMap();showNode();}
function buildMap(){const board=$('mapBoard');board.querySelectorAll('.node').forEach(n=>n.remove());nodePos.forEach((p,i)=>{const n=document.createElement('div');n.className='node '+(i<state.node?'done':i===state.node?'active':'locked');n.style.left=p[0];n.style.top=p[1];n.innerHTML=i===8?`<img src="${A.uiStar}" alt="finish">`:String(i+1);board.appendChild(n)});movePlayer();}
function movePlayer(){const p=nodePos[state.node]||nodePos[0];const pl=$('player');pl.style.left=`calc(${p[0]} + 9px)`;pl.style.top=`calc(${p[1]} + 9px)`;}
function showNode(){buildMap();updateStats();const type=['story','question','mini','question','choice','question','shopgate','question','finish'][state.node]||'question'; if(type==='story')return storyEvent(); if(type==='mini')return gemDash(); if(type==='choice')return choiceEvent(); if(type==='shopgate')return gateEvent(); if(type==='finish')return finishWorld(); return questionEvent();}
function nextNode(){state.node++; if(state.node>8)state.node=8; setTimeout(showNode,350)}
function panel(html){$('actionPanel').innerHTML=html}
function storyEvent(){const w=worlds.find(x=>x.id===state.world);panel(`<div class="eventTitle">${w.name}</div><p class="eventText">The portal opens. Your map has locked gates, hidden gems, and helper items. Finish the trail to light this door.</p><div class="visual">${portalSvg(w.accent)}</div><button class="btn" onclick="nextNode()">START THE TRAIL</button>`)}
function questionEvent(){const q=pick(banks[state.world]);const choices=dedupeChoices(q.choices,q.answer);panel(`<div class="eventTitle">${q.title}</div><p class="eventText">${q.text}</p><div class="visual">${visual(q)}</div><div class="choices">${choices.map(c=>`<button class="choice" onclick="answerQuestion(this,'${esc(c)}','${esc(q.answer)}','${esc(q.ex)}')">${c}</button>`).join('')}</div><div id="explain" class="answerExplain"></div>`)}
function answerQuestion(btn,pick,ans,ex){document.querySelectorAll('.choice').forEach(b=>b.disabled=true);if(pick===ans){btn.classList.add('correct');state.gems+=3;if(Math.random()<.45)state.keys++;$('explain').innerHTML=`Correct. ${ex}<br><b>+3 gems</b>`;setTimeout(nextNode,1450)}else{btn.classList.add('wrong');$('explain').innerHTML=`Not this time. ${ex}<br><b>+1 gem for trying</b>`;state.gems+=1;setTimeout(nextNode,1700)}updateStats()}
function choiceEvent(){const opts=[['OPEN THE CHEST','Spend 4 gems to open a chest.','chest'],['TAKE THE SHORTCUT','Use 1 key to skip ahead.','shortcut'],['HELP A GUIDE','Gain a helper item for later.','helper']];panel(`<div class="eventTitle">MAP CHOICE</div><p class="eventText">Choose what happens next. Your gems and keys now matter.</p><div class="choices">${opts.map(o=>`<button class="choice" onclick="doChoice('${o[2]}')"><b>${o[0]}</b><br><span class="tiny">${o[1]}</span></button>`).join('')}</div><div class="notice">No answer is pre-highlighted. Pick a path.</div>`)}
function doChoice(kind){if(kind==='chest'){if(state.gems>=4){state.gems-=4;state.items.push('TREASURE STICKER');panel(`<div class="eventTitle">CHEST OPENED</div><p class="eventText">You spent 4 gems and found a treasure sticker.</p><div class="visual">${gemSvg('#f5b642')}</div><button class="btn" onclick="nextNode()">KEEP GOING</button>`)}else{panel(`<div class="eventTitle">CHEST LOCKED</div><p class="eventText">You need 4 gems. The trail gives you a small helper gem instead.</p><button class="btn" onclick="state.gems++;nextNode()">KEEP GOING</button>`)}} if(kind==='shortcut'){if(state.keys>0){state.keys--;state.node++;panel(`<div class="eventTitle">SHORTCUT OPEN</div><p class="eventText">You used a key and moved ahead on the map.</p><button class="btn" onclick="nextNode()">KEEP GOING</button>`)}else{panel(`<div class="eventTitle">NO KEY YET</div><p class="eventText">The shortcut stays closed. Try the regular path.</p><button class="btn" onclick="nextNode()">KEEP GOING</button>`)}} if(kind==='helper'){state.items.push('HELPER GUIDE');panel(`<div class="eventTitle">HELPER FOUND</div><p class="eventText">A guide joins your collection. Helpers can protect your gems later.</p><div class="visual"><img src="${A.monkey}" alt="helper" style="max-height:130px"></div><button class="btn" onclick="nextNode()">KEEP GOING</button>`)} updateStats()}
function gateEvent(){panel(`<div class="eventTitle">LOCKED GATE</div><p class="eventText">The gate opens for 6 gems or 1 key. Spend carefully.</p><div class="choices"><button class="choice" onclick="openGate('gems')">SPEND 6 GEMS</button><button class="choice" onclick="openGate('key')">USE 1 KEY</button><button class="choice" onclick="openGate('challenge')">TRY A BONUS QUESTION</button></div>`)}
function openGate(kind){if(kind==='gems'&&state.gems>=6){state.gems-=6;return gateSuccess('The gem lock shines and opens.')} if(kind==='key'&&state.keys>=1){state.keys--;return gateSuccess('The key turns and the gate opens.')} if(kind==='challenge')return questionEvent(); panel(`<div class="eventTitle">NOT ENOUGH YET</div><p class="eventText">The gate gives you a rescue challenge instead.</p><button class="btn" onclick="questionEvent()">TRY THE CHALLENGE</button>`);updateStats()}
function gateSuccess(msg){panel(`<div class="eventTitle">GATE OPEN</div><p class="eventText">${msg}</p><button class="btn" onclick="nextNode()">ENTER</button>`);updateStats()}
function finishWorld(){state.gems+=5;state.keys+=1;state.items.push(worlds.find(w=>w.id===state.world).name+' LIGHT');panel(`<div class="eventTitle">DOOR LIT</div><p class="eventText">This portal is glowing now. You earned 5 gems, 1 key, and a door light for your collection.</p><div class="visual">${portalSvg('#ffd166')}</div><div class="footerBtns"><button class="btn" onclick="renderHome()">BACK TO PURPLE DOOR LAND</button><button class="btn alt" onclick="startWorld('${state.world}')">PLAY THIS WORLD AGAIN</button></div>`);updateStats();}
function gemDash(){const target=Math.floor(Math.random()*8);panel(`<div class="eventTitle">GEM DASH</div><p class="eventText">Find the green power gem before the gate closes.</p><div class="miniGrid">${Array.from({length:8},(_,i)=>`<button class="miniGem ${i===target?'target':''}" onclick="gemPick(${i},${target})">${gemSvg(i===target?'#10b981':'#8b5cf6')}</button>`).join('')}</div><div id="miniMsg" class="answerExplain"></div>`)}
function gemPick(i,t){document.querySelectorAll('.miniGem').forEach(b=>b.disabled=true);if(i===t){state.gems+=4;$('miniMsg').textContent='Power gem found. +4 gems.'}else{state.gems+=1;$('miniMsg').textContent='You found a small gem. +1 gem.'}updateStats();setTimeout(nextNode,1200)}
function openShop(){panelShop();$('homeScreen').style.display='none';$('gameScreen').style.display='block';$('mapTitle').textContent='GEM SHOP';$('mapSub').textContent='Spend gems on things that change the trail.';$('mapBoard').innerHTML='<div class="door" style="transform:scale(.72);margin:90px auto"></div>';}
function panelShop(){const items=[['HINT LAMP',5,'Removes one wrong answer during a challenge.'],['RESCUE ROPE',7,'Opens one blocked path.'],['DOOR CHARM',10,'Adds a decoration to your collection.']];panel(`<div class="eventTitle">GEM SHOP</div><p class="eventText">Buy items, then use them on future trails.</p><div class="shopGrid">${items.map(i=>`<button class="shopItem" onclick="buyItem('${i[0]}',${i[1]})"><img src="${A.uiStar}" alt=""><b>${i[0]}</b><span>${i[1]} gems</span><span class="tiny">${i[2]}</span></button>`).join('')}</div><div class="collectionGrid">${state.items.map(x=>`<div class="collectionItem"><img src="${A.uiStar}" alt=""><b>${x}</b></div>`).join('')||'<div class="notice">Your collection will show up here.</div>'}</div><button class="btn alt" onclick="renderHome()">BACK</button>`)}
function buyItem(name,cost){if(state.gems>=cost){state.gems-=cost;state.items.push(name);panelShop();updateStats()}else alert('Earn more gems first.')}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function dedupeChoices(choices,ans){const set=[ans,...choices].filter(Boolean);const out=[];for(const c of set){if(!out.includes(c))out.push(c)}const fillers=['Not enough information','Try another path','Both are equal','None of these'];for(const f of fillers){if(out.length>=4)break;if(!out.includes(f))out.push(f)}return shuffle(out).slice(0,4)}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)} function esc(s){return String(s).replace(/'/g,'&#39;')}
function visual(q){if(q.type==='clock')return clockSvg(q.data.h,q.data.m); if(q.type==='money')return moneySvg(q.data); if(q.type==='chart')return chartSvg(q.data); if(q.type==='pictograph')return pictographSvg(q.data); if(q.type==='map')return mapSvg(); return portalSvg(worlds.find(w=>w.id===state.world).accent)}
function portalSvg(c){return `<svg viewBox="0 0 500 210" role="img" aria-label="glowing portal"><rect width="500" height="210" rx="28" fill="#f8f1ff"/><ellipse cx="250" cy="108" rx="70" ry="92" fill="${c}" opacity=".35"/><ellipse cx="250" cy="108" rx="50" ry="70" fill="#fff"/><ellipse cx="250" cy="108" rx="84" ry="104" fill="none" stroke="${c}" stroke-width="18"/><path d="M75 168 C140 132 190 160 250 130 C310 100 365 132 425 92" fill="none" stroke="#251a37" stroke-width="10" stroke-linecap="round"/><circle cx="92" cy="62" r="12" fill="#ffd166"/><circle cx="410" cy="145" r="10" fill="#84dcc6"/></svg>`}
function gemSvg(c){return `<svg viewBox="0 0 80 80" aria-hidden="true"><polygon points="40,6 70,28 58,70 22,70 10,28" fill="${c}" stroke="#251a37" stroke-width="5"/><path d="M10 28h60M25 28l15 42 15-42M25 28l15-22 15 22" fill="none" stroke="#fff" stroke-width="4" opacity=".55"/></svg>`}
function coin(type,x){const map={penny:['#b87333','1¢','PENNY',28],nickel:['#d0cfc8','5¢','NICKEL',30],dime:['#d8d8d8','10¢','DIME',24],quarter:['#c8c8c8','25¢','QUARTER',34]};const m=map[type];return `<g transform="translate(${x} 45)"><circle cx="0" cy="0" r="${m[3]}" fill="${m[0]}" stroke="#555" stroke-width="3"/><circle cx="0" cy="0" r="${m[3]-7}" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="2"/><text x="0" y="4" text-anchor="middle" font-size="15" font-weight="900" fill="#222">${m[1]}</text><text x="0" y="20" text-anchor="middle" font-size="7" font-weight="900" fill="#333">${m[2]}</text></g>`}
function moneySvg(coins){return `<svg viewBox="0 0 620 150" role="img" aria-label="coins"> <rect width="620" height="150" rx="24" fill="#fff8e6"/>${coins.map((c,i)=>coin(c,75+i*112)).join('')}</svg>`}
function clockSvg(h,m){const angM=m*6,angH=(h%12)*30+m*.5;let ticks='';for(let i=1;i<=12;i++){const a=(i*30-90)*Math.PI/180;const x=150+112*Math.cos(a),y=150+112*Math.sin(a);ticks+=`<text x="${x}" y="${y+8}" text-anchor="middle" font-size="24" font-weight="900">${i}</text>`}return `<svg viewBox="0 0 300 300" role="img" aria-label="analog clock"><circle cx="150" cy="150" r="135" fill="#fff" stroke="#251a37" stroke-width="8"/>${ticks}<line x1="150" y1="150" x2="150" y2="62" stroke="#2563eb" stroke-width="7" stroke-linecap="round" transform="rotate(${angM} 150 150)"/><line x1="150" y1="150" x2="150" y2="88" stroke="#dc2626" stroke-width="10" stroke-linecap="round" transform="rotate(${angH} 150 150)"/><circle cx="150" cy="150" r="10" fill="#251a37"/></svg>`}
function chartSvg(d){const max=Math.max(...d.values)+1;const colors=['#3b82f6','#f59e0b','#10b981','#ef4444','#8b5cf6','#ec4899'];return `<svg viewBox="0 0 700 360" role="img" aria-label="bar chart"><rect width="700" height="360" rx="24" fill="#fff"/><text x="350" y="38" text-anchor="middle" font-size="28" font-weight="900">${d.title}</text><line x1="80" y1="290" x2="640" y2="290" stroke="#251a37" stroke-width="5"/><line x1="80" y1="70" x2="80" y2="290" stroke="#251a37" stroke-width="5"/>${d.values.map((v,i)=>{const h=v/max*190,x=120+i*125,y=290-h;return `<rect x="${x}" y="${y}" width="70" height="${h}" rx="10" fill="${colors[i]}"/><text x="${x+35}" y="${y-10}" text-anchor="middle" font-size="24" font-weight="900">${v}</text><text x="${x+35}" y="325" text-anchor="middle" font-size="20" font-weight="900">${d.labels[i]}</text>`}).join('')}</svg>`}
function pictographSvg(d){return `<svg viewBox="0 0 700 360" role="img" aria-label="pictograph"><rect width="700" height="360" rx="24" fill="#fff"/><text x="350" y="38" text-anchor="middle" font-size="26" font-weight="900">${d.key}</text>${d.rows.map((r,ri)=>`<text x="40" y="${100+ri*78}" font-size="24" font-weight="900">${r[0]}</text>${Array.from({length:r[1]},(_,i)=>`<circle cx="${205+i*54}" cy="${91+ri*78}" r="20" fill="#8b5cf6" stroke="#251a37" stroke-width="4"/>`).join('')}`).join('')}</svg>`}
function mapSvg(){return `<svg viewBox="0 0 600 360" role="img" aria-label="simple city map"><rect width="600" height="360" rx="24" fill="#f2fbff"/><path d="M100 50v260M250 50v260M400 50v260M70 100h460M70 220h460" stroke="#9ca3af" stroke-width="18" stroke-linecap="round"/><rect x="80" y="232" width="100" height="70" rx="12" fill="#ffd166" stroke="#251a37" stroke-width="5"/><text x="130" y="274" text-anchor="middle" font-size="20" font-weight="900">SCHOOL</text><rect x="395" y="98" width="110" height="70" rx="12" fill="#b7f7d1" stroke="#251a37" stroke-width="5"/><text x="450" y="140" text-anchor="middle" font-size="20" font-weight="900">LIBRARY</text><path d="M130 232 L400 220 L450 168" fill="none" stroke="#ef4444" stroke-width="10" stroke-linecap="round" stroke-dasharray="18 14"/></svg>`}
renderHome();
</script>
</body>
</html>
